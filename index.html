    <!-- Inline critical CSS for instant first paint -->
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; }
      #root { min-height: 100vh; }
      .loading-screen { 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        color: #666;
        gap: 1rem;
      }
      .loading-logo {
        width: 80px;
        height: 80px;
        border-radius: 16px;
        display: block;
        object-fit: cover;
        background:  #e5e8eb;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      .loading-text { font-size: 1.25rem; color: #427baa; font-weight: 500; }
    </style>
